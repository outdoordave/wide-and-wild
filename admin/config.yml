backend:
  name: github
  repo: outdoordave/AD-Photography
  branch: main
  base_url: https://aanddphotography-oauth.davidbastisch.workers.dev
  auth_endpoint: auth
media_folder: uploads
public_folder: /uploads

# === 🖼️ Automatische Bild-Optimierung (Sveltia) ===
# Bilder werden beim Hochladen NOCH IM BROWSER verkleinert und nach WebP
# umgewandelt, BEVOR sie zu GitHub committet werden. Das loest das
# Speicher-/Groessen-Problem: aus z.B. 80 MB Originalfotos werden wenige MB.
# Gilt fuer ALLE Bild-Felder (Portfolio, Startseite, Ausruestung ...).
# quality 85 + max 2400px = sehr gute Qualitaet fuer eine Fotoseite.
# Hinweis: In Safari dauert die Umwandlung etwas laenger (kein natives WebP),
# der Upload geht aber durch. max_file_size greift NACH der Umwandlung.
media_libraries:
  default:
    config:
      max_file_size: 10000000   # 10 MB Sicherheitsnetz NACH der Optimierung
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2400
          height: 2400
        svg:
          optimize: true
locale: de
collections:

# === 🏞️ Startseite (Hero-Bild/Video) ===
- name: homepage
  label: 🏞️ Startseite
  files:
  - name: hero
    label: Großes Bild / Video oben
    file: content/home.json
    description: Was ganz oben auf der Startseite gezeigt wird.
    fields:
    - name: mode
      label: Was anzeigen?
      widget: select
      default: image
      options:
      - label: Einzelbild
        value: image
      - label: Diashow (zufällige Bilder)
        value: random
      - label: Video
        value: video
    - name: image
      label: Einzelbild
      widget: image
      required: false
      hint: JPG/PNG bis ca. 10 MB.
    - name: slideshow
      label: Diashow-Bilder
      widget: list
      required: false
      summary: '{{fields.img}}'
      field:
        name: img
        label: Bild
        widget: image
    - name: video
      label: Video (MP4)
      widget: file
      required: false
      hint: MP4, stumm. Max ca. 30 MB.
    - name: video_poster
      label: Video-Vorschaubild
      widget: image
      required: false

# === 🖼️ Portfolio ===
- name: portfolio
  label: 🖼️ Portfolio
  label_singular: Album
  description: Alle Portfolio-Alben. Ein Album = ein Ordner mit Fotos. Mehrere Fotos auf einmal hochladen mit Strg/Cmd+Klick im Datei-Dialog.
  folder: content/albums
  create: true
  extension: json
  format: json
  identifier_field: name_de
  slug: '{{year}}-{{slug}}'
  summary: '{{name_de}}  -  {{date}}'
  view_style: grid
  sortable_fields:
  - date
  - name_de
  fields:
  - name: name_de
    label: Album-Name
    widget: string
    hint: z.B. USA-Westen 2024, Yosemite Frühling 2025
  - name: date
    label: Datum
    widget: datetime
    date_format: YYYY-MM-DD
    time_format: false
    format: YYYY-MM-DD
    picker_utc: false
    hint: 'Bestimmt die Sortierung (neueste oben). Bei Reisen: Datum der Reise.'
  - name: note_de
    label: Notiz / Beschreibung (optional)
    widget: text
    required: false
    hint: 'Optional: ein, zwei Sätze, die unter dem Album-Titel erscheinen.'
  - name: photos
    label: Fotos
    widget: list
    label_singular: Foto
    required: false
    hint: 'Mehrere Bilder auf einmal: im Datei-Dialog mit Strg/Cmd mehrere markieren – oder per Drag & Drop ziehen. Highlights für die Startseite werden jetzt zentral im Menü „⭐ Highlights" gepflegt, nicht mehr hier pro Foto.'
    field:
      name: image
      label: Bild
      widget: image
  - name: linked_trip
    label: Gehört zu Reise (optional)
    widget: relation
    collection: trips
    search_fields:
    - title_de
    value_field: '{{slug}}'
    display_fields:
    - title_de
    required: false
    multiple: false
    hint: Wenn das Album zu einer Reise gehört, wird auf der Reise-Seite ein Link zum Album angezeigt.
  - name: pin
    label: 📌 Album anpinnen
    widget: object
    collapsed: true
    required: false
    fields:
    - name: highlight
      label: Album anpinnen
      widget: boolean
      default: false
      required: false
      hint: Angepinnte Alben erscheinen oben in der Portfolio.
    - name: highlight_order
      label: Pin-Reihenfolge
      widget: number
      value_type: int
      default: 1
      required: false
      hint: Kleine Zahl = weiter oben.
  - name: english
    label: 🌐 Englische Version
    widget: object
    collapsed: true
    required: false
    fields:
    - name: enabled
      label: Englischen Album-Namen anzeigen?
      widget: boolean
      default: false
      required: false
    - name: name_en
      label: Album-Name (Englisch)
      widget: string
      required: false
    - name: note_en
      label: Notiz (Englisch)
      widget: text
      required: false

# === ⭐ Highlights (zentral, album-übergreifend) ===
# Eine einzige Bilderliste. Hier werden ALLE hochgeladenen Bilder im Medien-
# Picker angezeigt – du wählst deine Highlights an einer Stelle aus, ohne jedes
# Album einzeln durchzuklicken. Diese Fotos erscheinen in den „Momentaufnahmen"
# auf der Startseite.
- name: highlights
  label: ⭐ Highlights
  files:
  - name: list
    label: Highlight-Fotos (Startseite)
    file: content/highlights.json
    description: Zentrale Auswahl der Highlight-Fotos für die „Momentaufnahmen" auf der Startseite. Album-übergreifend – einmal auswählen, fertig.
    fields:
    - name: images
      label: Highlight-Fotos
      widget: list
      required: false
      hint: '„Bild hinzufügen" klicken → im Medien-Fenster ein bereits hochgeladenes Foto auswählen (oder ein neues hochladen). Reihenfolge per Ziehen änderbar. Diese Bilder erscheinen zufällig in den Momentaufnahmen auf der Startseite.'
      field:
        name: image
        label: Foto
        widget: image

# === ⚙️ Einstellungen (kleine Schalter, gebündelt) ===
# Bündelt die selten gebrauchten Schalter in EINEM Menü statt mehrerer:
# Portfolio-Sortier-Knöpfe + Stories-Sichtbarkeit. Die Dateien bleiben dieselben
# wie bisher (gallery-settings.json / stories-settings.json).
- name: settings
  label: ⚙️ Einstellungen
  description: Kleine Schalter für die Website – selten anzufassen.
  files:
  - name: gallery_sort
    label: 🖼️ Portfolio-Sortierung
    file: content/gallery-settings.json
    description: Steuert, welche Sortier-Knöpfe über der Portfolio erscheinen (Alben / Neueste / A–Z). Mindestens einer sollte an sein.
    fields:
    - name: show_album
      label: „Alben" anzeigen (nach Alben gruppiert)
      widget: boolean
      default: true
      hint: Zeigt die Portfolio in Album-Sektionen mit Überschrift.
    - name: show_chronological
      label: „Neueste" anzeigen (nach Datum)
      widget: boolean
      default: true
      hint: Alle Fotos flach, neueste zuerst.
    - name: show_alphabetical
      label: „A–Z" anzeigen (nach Albumname)
      widget: boolean
      default: true
      hint: Alle Fotos flach, Alben alphabetisch.
  - name: stories_visibility
    label: 📖 Stories-Sichtbarkeit
    file: content/stories-settings.json
    description: Steuert, ob der Stories-Bereich auf der Webseite sichtbar ist. Wenn aus, ist auch der Reiter ausgeblendet.
    fields:
    - name: show_stories
      label: 📖 Stories-Bereich auf der Webseite anzeigen?
      widget: boolean
      default: false
      hint: Aus = Stories-Reiter und Hero-Button werden auf der Webseite versteckt. Bestehende Stories bleiben im CMS erhalten.
  - name: appearance
    label: 🎨 Darstellung & Logo
    file: content/appearance-settings.json
    description: Logo der Website und einzelne Anzeige-Schalter für die Startseite.
    fields:
    - name: logo
      label: Logo (für Navigation & Titelbild)
      widget: image
      required: false
      hint: Wird oben in der Navigation und – falls aktiviert – groß über dem Titelbild (Hero) angezeigt. Beide nutzen dasselbe Logo. Leer lassen, um das fest eingebaute Logo zu behalten.
    - name: show_hero_logo
      label: Logo über dem Titelbild anzeigen?
      widget: boolean
      default: true
      hint: Aus = das große Logo über dem Hero-Bild auf der Startseite wird ausgeblendet. Das Logo in der Navigation bleibt davon unberührt.
    - name: show_discover
      label: „Entdecken“-Bereich auf der Startseite anzeigen?
      widget: boolean
      default: true
      hint: Der Bereich „Wonach uns gerade ist“ direkt unter „Aktuell“. Aus = wird auf der Startseite ausgeblendet.

# === 📖 Stories / Beiträge ===
- name: stories
  label: 📖 Stories
  label_singular: Beitrag
  description: Reise-Geschichten. Werden automatisch nach Datum sortiert (neueste zuerst).
  folder: content/stories
  create: true
  extension: md
  format: frontmatter
  identifier_field: title_de
  slug: '{{year}}-{{month}}-{{slug}}'
  summary: '{{title_de}}  -  {{date}}'
  # Karten-Ansicht mit Titelbild als Vorschau:
  view_style: grid
  sortable_fields:
  - date
  - title_de
  fields:
  - name: title_de
    label: Titel
    widget: string
  - name: category_de
    label: Ort / Kategorie
    widget: string
    hint: z.B. Kalifornien, USA
  - name: date
    label: Wann (Monat + Jahr)
    widget: datetime
    date_format: YYYY-MM
    time_format: false
    format: YYYY-MM-DD
    picker_utc: false
    hint: Nur Monat + Jahr. Bestimmt die Reihenfolge (neueste zuerst).
  - name: cover
    label: Titelbild
    widget: image
    required: false
    hint: Großes Bild oben. JPG/PNG bis ca. 10 MB.
  - name: excerpt_de
    label: Anriss / Vorschautext
    widget: text
    hint: 1-2 Sätze für die Übersicht.
  - name: body_de
    label: Haupttext
    widget: markdown
    hint: Der eigentliche Beitrag.
    modes:
    - rich_text
    - raw
    buttons:
    - bold
    - italic
    - heading-one
    - heading-two
    - heading-three
    - quote
    - bulleted-list
    - numbered-list
    - link
    editor_components:
    - image
  - name: english
    label: 🌐 Englische Version
    widget: object
    collapsed: true
    required: false
    fields:
    - name: enabled
      label: Englische Version anzeigen?
      widget: boolean
      default: false
      required: false
      hint: Ein = englische Felder werden auf der Website gezeigt.
    - name: title_en
      label: Titel (Englisch)
      widget: string
      required: false
    - name: category_en
      label: Ort / Kategorie (Englisch)
      widget: string
      required: false
    - name: excerpt_en
      label: Anriss (Englisch)
      widget: text
      required: false
    - name: body_en
      label: Haupttext (Englisch)
      widget: markdown
      required: false
      modes:
      - rich_text
      - raw
      buttons:
      - bold
      - italic
      - heading-one
      - heading-two
      - heading-three
      - quote
      - bulleted-list
      - numbered-list
      - link
      editor_components:
      - image

# === 🗺️ Reisen ===
- name: trips
  label: 🗺️ Reisen
  label_singular: Reise
  description: Reisen mit Stationen auf der Karte. Angepinnte zuerst, sonst nach Datum (neueste zuerst).
  folder: content/trips
  create: true
  extension: json
  format: json
  identifier_field: title_de
  slug: '{{year}}-{{month}}-{{slug}}'
  summary: '{{title_de}}  -  {{date}}'
  # Karten-Ansicht mit Vorschaubild (erste Station-Foto bzw. erstes Portfolio-Bild):
  view_style: grid
  sortable_fields:
  - date
  - title_de
  fields:
  - name: title_de
    label: Titel
    widget: string
    hint: z.B. West-Runde 2024
  - name: date
    label: Wann (Monat + Jahr)
    widget: datetime
    date_format: YYYY-MM
    time_format: false
    format: YYYY-MM-DD
    picker_utc: false
    hint: Nur Monat + Jahr. Zukünftige Reisen erscheinen ganz oben.
  - name: meta_de
    label: Zusatz-Info zum Zeitraum (optional)
    widget: string
    required: false
    hint: 'Optional: ergänzt das Datum, z.B. ''18 Tage, der große Westen''. Leer = nur Monat/Jahr wird gezeigt.'
  - name: summary_de
    label: Zusammenfassung
    widget: text
  - name: upcoming
    label: Kommende Reise?
    widget: boolean
    default: false
    required: false
  - name: stops
    label: Stationen
    label_singular: Station
    widget: list
    summary: '{{fields.name}}'
    hint: Ort suchen eingeben, aus Dropdown wählen, Koordinaten werden automatisch gefüllt.
    fields:
    - name: location
      label: 📍 Ort (Karte mit Suche)
      widget: map
      type: Point
      decimals: 6
      required: false
      hint: Ort oben im Suchfeld eingeben und auswählen ODER direkt auf die Karte klicken. Der Punkt wird automatisch gespeichert. Bestehende Reisen zeigen ihren Ort bereits an.
    - name: name
      label: Ort (Anzeigename)
      widget: string
    - name: title_de
      label: Überschrift
      widget: string
      required: false
    - name: text_de
      label: Beschreibung
      widget: text
      required: false
    - name: date_de
      label: Datum-Notiz
      widget: string
      required: false
      hint: z.B. 28. Sept - 01. Okt
    - name: photo
      label: Titelbild der Station (optional)
      widget: image
      required: false
      hint: Dieses Bild wird zugeschnitten als Vorschau gezeigt. Wähle eins, dessen Bildmitte gut aussieht.
    - name: photos
      label: Weitere Bilder dieser Station (optional)
      widget: list
      required: false
      hint: Beliebig viele Fotos. Werden als Portfolio unter der Station gezeigt, NICHT zugeschnitten.
      field:
        name: image
        label: Bild
        widget: image
    - name: english
      label: 🌐 Englische Version (dieser Station)
      widget: object
      collapsed: true
      required: false
      fields:
      - name: title_en
        label: Überschrift (Englisch)
        widget: string
        required: false
      - name: text_en
        label: Beschreibung (Englisch)
        widget: text
        required: false
      - name: date_en
        label: Datum-Notiz (Englisch)
        widget: string
        required: false
  - name: pin
    label: 📌 Anpinnen & Sortierung
    widget: object
    collapsed: true
    required: false
    fields:
    - name: highlight
      label: Anpinnen (Highlight)
      widget: boolean
      default: false
      required: false
      hint: Ein = diese Reise wird oben angepinnt, unabhängig vom Datum.
    - name: highlight_order
      label: Pin-Reihenfolge
      widget: number
      value_type: int
      default: 1
      required: false
      hint: Nur relevant wenn angepinnt. Kleine Zahl = weiter oben. Bei gleicher Zahl entscheidet das Datum.
  - name: album_hint
    label: 🖼️ Verknüpftes Album
    widget: object
    collapsed: false
    required: false
    hint: 'Wenn ein Album zu dieser Reise gehört (in der Portfolio unter "Gehört zu Reise" einstellen), erscheint auf der Reise-Seite automatisch ein Link "Mehr Fotos im Album X". Diese Verknüpfung wird im Album gepflegt, nicht hier.'
    fields:
    - name: _info
      label: Hinweis
      widget: string
      required: false
      default: 'Album-Verknüpfung wird im Portfolio-Album eingestellt'
      hint: Dieses Feld ist nur ein Hinweis. Die Verknüpfung selbst stellst du in der Portfolio beim jeweiligen Album ein (Dropdown "Gehört zu Reise").
  - name: gallery_block
    label: 🖼️ Reise-Portfolio (Reisefazit)
    widget: object
    collapsed: true
    required: false
    fields:
    - name: gallery
      label: Bilder
      widget: list
      required: false
      hint: Deine Lieblingsbilder der ganzen Reise. Werden am Ende der Reise als große Portfolio gezeigt, NICHT zugeschnitten.
      fields:
      - name: image
        label: Bild
        widget: image
      - name: caption_de
        label: Bildunterschrift (optional)
        widget: string
        required: false
      - name: caption_en
        label: Bildunterschrift Englisch (optional)
        widget: string
        required: false
  - name: english
    label: 🌐 Englische Version (gesamte Reise)
    widget: object
    collapsed: true
    required: false
    fields:
    - name: enabled
      label: Englische Version anzeigen?
      widget: boolean
      default: false
      required: false
    - name: title_en
      label: Titel (Englisch)
      widget: string
      required: false
    - name: meta_en
      label: Zusatz-Info (Englisch, optional)
      widget: string
      required: false
    - name: summary_en
      label: Zusammenfassung (Englisch)
      widget: text
      required: false

