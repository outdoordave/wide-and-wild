          value: lenses
        - label: Drohne & Action
          value: drones
        - label: Smartphone
          value: phone
        - label: Stativ
          value: tripod
        - label: Rucksack
          value: backpack
        - label: Kochen und Camp
          value: cooking
      - name: link
        label: Link (optional)
        widget: string
        required: false
