<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Wide &amp; Wild — Verwaltung</title>
  <!-- Das CMS uebernimmt das GitHub-OAuth-Popup selbst.
       Login geht ueber den Cloudflare-Worker (siehe admin/config.yml -> backend.base_url). -->
  <style>
    /* Zurück-zur-Website-Knopf unten links.
       WICHTIG: NICHT oben rechts platzieren -- dort sitzt in Sveltia der
       Speichern-Button. Unten links kollidiert weder mit der oberen
       Editor-Leiste noch mit der unteren (mittigen) Bestaetigungsmeldung. */
    .ww-back-btn {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 999990;
      background: #a7672f;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      opacity: .82;
      transition: background .15s, opacity .15s;
    }
    .ww-back-btn:hover { background: #b97a3f; opacity: 1; }

    /* Upload-/Speicher-Indikator (Banner unten) */
    #ww-progress {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999998;
      background: #1c1812;
      color: #f4ede1;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      min-width: 260px;
    }
    #ww-progress .ww-progress-label { margin-bottom: 6px; }
    #ww-progress .ww-progress-bar {
      height: 6px;
      background: rgba(255,255,255,.15);
      border-radius: 3px;
      overflow: hidden;
    }
    #ww-progress .ww-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a7672f, #b08a4f);
      width: 0%;
      transition: width .3s;
      border-radius: 3px;
    }
    /* Unbestimmte "Speichern laeuft"-Anzeige: ein schmaler Balken wandert
       hin und her (es gibt keinen echten Prozent-Fortschritt fuers Speichern). */
    #ww-progress .ww-progress-fill.ww-indeterminate {
      width: 40% !important;
      transition: none;
      animation: ww-indet 1.1s ease-in-out infinite;
    }
    @keyframes ww-indet {
      0%   { margin-left: -40%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Zurück zur Website -->
  <a href="/" class="ww-back-btn" title="Zurück zur Website">← Zurück zur Website</a>

  <!-- Fortschritts-Banner -->
  <div id="ww-progress" role="status" aria-live="polite">
    <div class="ww-progress-label">Speichern …</div>
    <div class="ww-progress-bar"><div class="ww-progress-fill"></div></div>
  </div>

  <!-- Sveltia CMS: aktiv gepflegter, direkter Nachfolger von Decap CMS.
       Liest dieselbe admin/config.yml und schreibt dieselben JSON/MD-Dateien,
       kann aber mehrere Bilder auf einmal hochladen (Durchsuchen oder Drag & Drop)
       und bringt eine eigene, mobiltaugliche Oberflaeche mit. Login laeuft ueber
       denselben GitHub-OAuth-Worker wie bisher (config.yml -> backend.base_url).
       RUECKFAHRKARTE: Wenn etwas klemmt, einfach diese eine <script>-Zeile wieder
       auf das alte Decap-Script zuruecksetzen, dann ist alles wie vorher:
       <script src="https://unpkg.com/decap-cms@3.1.3/dist/decap-cms.js"></script> -->
  <script src="https://unpkg.com/@sveltia/cms@0.164.2/dist/sveltia-cms.js"></script>

  <!-- Erweiterungen (Ortssuche, Fortschrittsanzeige, Login-Redirect) -->
  <script>
  (function(){
    'use strict';

    // ----------- 1) (Login-Handling uebernimmt Decap CMS via GitHub-OAuth-Worker) -----------

    // ----------- 1b) Beitrags-Vorschau wie auf der Website -----------
    // Registriert ein Preview-Template fuer Stories, das das reader-hero/
    // reader-body-Layout der echten Seite nachbildet (Farben, Schriften, Bilder).
    var WW_PREVIEW_CSS = [
      ':root{',
      '  --c-bg:#f4ede1; --c-bg-alt:#ebe1d1; --c-ink:#2e2418; --c-ink-soft:#6e5e49;',
      '  --c-line:#d8cab2; --c-accent:#a7672f; --c-accent-dk:#834e1f; --c-gold:#b08a4f;',
      '  --radius:10px;',
      '}',
      'body{margin:0;background:var(--c-bg);color:var(--c-ink);',
      '  font-family:Georgia,"Times New Roman",serif;}',
      '.ww-prev-hero{position:relative;min-height:42vh;display:flex;align-items:flex-end;',
      '  background-size:cover;background-position:center;background-color:var(--c-bg-alt);}',
      '.ww-prev-hero::before{content:"";position:absolute;inset:0;z-index:1;',
      '  background:linear-gradient(to top,var(--c-bg) 1%,rgba(244,237,225,0.1) 45%,transparent);}',
      '.ww-prev-hero-inner{position:relative;z-index:2;max-width:760px;margin:0 auto;',
      '  width:100%;padding:0 24px 36px;box-sizing:border-box;}',
      '.ww-prev-hero-inner .meta{font-size:12px;letter-spacing:2px;text-transform:uppercase;',
      '  color:var(--c-accent);font-weight:700;margin-bottom:12px;}',
      '.ww-prev-hero-inner h1{font-size:clamp(30px,5vw,52px);font-weight:500;line-height:1.08;margin:0;}',
      '.ww-prev-body{max-width:720px;margin:0 auto;padding:40px 24px 30px;box-sizing:border-box;}',
      '.ww-prev-body p{font-size:18px;line-height:1.85;margin-bottom:24px;color:#4a3d2c;}',
      '.ww-prev-body p:first-of-type::first-letter{font-size:60px;font-weight:600;float:left;',
      '  line-height:0.8;padding:6px 12px 0 0;color:var(--c-accent);}',
      '.ww-prev-body h2{font-size:30px;font-weight:600;line-height:1.2;margin:44px 0 16px;color:var(--c-ink);}',
      '.ww-prev-body h3{font-size:23px;font-weight:600;line-height:1.25;margin:36px 0 12px;color:var(--c-ink);}',
      '.ww-prev-body blockquote{font-size:27px;font-style:italic;line-height:1.35;color:var(--c-accent);',
      '  border-left:3px solid var(--c-gold);padding-left:24px;margin:40px 0;}',
      '.ww-prev-body ul,.ww-prev-body ol{font-size:18px;line-height:1.85;margin:0 0 24px 26px;color:#4a3d2c;}',
      '.ww-prev-body a{color:var(--c-accent);text-underline-offset:2px;}',
      '.ww-prev-body img{max-width:100%;max-height:540px;width:auto;height:auto;object-fit:cover;',
      '  border-radius:var(--radius);margin:38px auto;display:block;}',
      '.ww-prev-empty{max-width:720px;margin:0 auto;padding:24px;color:var(--c-ink-soft);font-style:italic;}',
      '.ww-prev-gear{max-width:720px;margin:0 auto;padding:30px 24px;}',
      '.ww-prev-gear-h{font-size:28px;font-weight:600;margin:0 0 24px;color:#2e2418;}',
      '.ww-prev-gear-cat{margin-bottom:24px;}',
      '.ww-prev-gear-cat-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#a7672f;font-weight:700;margin-bottom:8px;border-bottom:1px solid #d8cab2;padding-bottom:4px;}',
      '.ww-prev-gear-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ebe1d1;}',
      '.ww-prev-gear-item{font-size:16px;color:#2e2418;}',
      '.ww-prev-gear-brand{font-size:14px;color:#6e5e49;}'
    ].join('\n');

    // Bildpfad normalisieren (analog zur Website-Logik fuer /uploads/)
    function wwNormalizeImage(path){
      if (!path) return '';
      if (/^https?:\/\//i.test(path)) return path;
      if (path.charAt(0) === '/') return path;
      // relative Pfade unter uploads/ zu /uploads/ machen
      if (path.indexOf('uploads/') === 0) return '/' + path;
      return '/uploads/' + path.replace(/^\.?\//, '');
    }

    function registerPreviews(){
      // HINWEIS (Mai 2026): Diese Vorschau-Templates stammen aus der Decap-Zeit.
      // Sveltia hat 'registerPreviewTemplate' noch NICHT implementiert (laut
      // offizieller Doku vor v1.0 geplant) und baut auf Svelte statt React, stellt
      // also kein globales window.h (React.createElement) bereit. Der Guard unten
      // ('if (!CMSref || !href) return false') bricht deshalb unter Sveltia sofort
      // sauber ab -> dieser Block ist aktuell INERT (tut nichts, bricht nichts).
      // BEWUSST drangelassen: Sobald Sveltia das Feature nachruestet, koennen wir
      // die Templates hier mit kleinen Anpassungen zurueckportieren.
      //
      // Decap stellt 'h' (React.createElement) und 'CMS' global bereit.
      // In einer strict-IIFE kann window.h verzoegert sein – beide Wege pruefen.
      var CMSref = window.CMS || (typeof CMS !== 'undefined' ? CMS : null);
      var href   = window.h   || (typeof h   !== 'undefined' ? h   : null);
      if (!CMSref || !href) return false;
      var h = href;

      try {
        CMSref.registerPreviewStyle(WW_PREVIEW_CSS, { raw: true });

        CMSref.registerPreviewTemplate('stories', function(props){
        var entry = props.entry;
        function get(field){ return entry.getIn(['data', field]) || ''; }

        // DE bevorzugen; wenn leer, EN
        var title = get('title_de') || get('title_en') || '(ohne Titel)';
        var cat   = get('category_de') || get('category_en') || '';
        var cover = wwNormalizeImage(get('cover'));

        // Markdown-Body als gerendertes HTML holen (Decap liefert widgetFor)
        var bodyDe = props.widgetFor('body_de');
        var bodyEn = props.widgetFor('body_en');
        var hasDe  = !!get('body_de');

        var heroStyle = cover ? { backgroundImage: 'url("' + cover + '")' } : {};

        return h('div', {},
          h('div', { className: 'ww-prev-hero', style: heroStyle },
            h('div', { className: 'ww-prev-hero-inner' },
              cat ? h('div', { className: 'meta' }, cat) : null,
              h('h1', {}, title)
            )
          ),
          h('div', { className: 'ww-prev-body' },
            hasDe ? bodyDe : (get('body_en') ? bodyEn :
              h('div', { className: 'ww-prev-empty' }, 'Noch kein Text. Schreibe etwas im Feld „Haupttext".'))
          )
        );
        });

        // ----- Equipment-Vorschau wie auf der Website (gruppiert nach Kategorie) -----
        var GEAR_CATS = [
          { cat:'cameras', de:'Kameras' }, { cat:'lenses', de:'Objektive' },
          { cat:'drones', de:'Drohne & Action' }, { cat:'phone', de:'Smartphone' },
          { cat:'tripod', de:'Stativ' }, { cat:'backpack', de:'Rucksack' },
          { cat:'cooking', de:'Kochen & Camp' }
        ];
        CMSref.registerPreviewTemplate('equipment', function(props){
          var items = props.entry.getIn(['data','items']);
          var list = items && items.toJS ? items.toJS() : [];
          var groups = [];
          for (var c = 0; c < GEAR_CATS.length; c++) {
            var inCat = list.filter(function(it){ return it && it.category === GEAR_CATS[c].cat; });
            if (inCat.length) groups.push({ name: GEAR_CATS[c].de, items: inCat });
          }
          return h('div', { className: 'ww-prev-gear' },
            h('h2', { className: 'ww-prev-gear-h' }, 'Womit wir fotografieren'),
            groups.length === 0
              ? h('div', { className: 'ww-prev-empty' }, 'Noch keine Ausrüstung eingetragen.')
              : groups.map(function(g, gi){
                  return h('div', { key: gi, className: 'ww-prev-gear-cat' },
                    h('div', { className: 'ww-prev-gear-cat-name' }, g.name),
                    g.items.map(function(it, ii){
                      return h('div', { key: ii, className: 'ww-prev-gear-row' },
                        h('span', { className: 'ww-prev-gear-item' }, it.name || ''),
                        h('span', { className: 'ww-prev-gear-brand' }, it.brand || '')
                      );
                    })
                  );
                })
          );
        });

        return true;
      } catch(e){
        console.warn('[Wide & Wild] Vorschau-Registrierung fehlgeschlagen:', e);
        return false;
      }
    }


    // ----------- 2) Upload-/Speicher-Fortschrittsanzeige -----------
    var progressEl   = document.getElementById('ww-progress');
    var progressLbl  = progressEl.querySelector('.ww-progress-label');
    var progressFill = progressEl.querySelector('.ww-progress-fill');
    var progressTimer = null;
    var progressFakePct = 0;

    function startProgress(label){
      try {
        if (progressTimer) clearInterval(progressTimer);
        progressLbl.textContent = label || 'Bitte warten …';
        progressEl.style.display = 'block';
        progressFakePct = 5;
        progressFill.style.width = progressFakePct + '%';
        // sanfter Fake-Fortschritt – echte Bytes kennt das CMS leider nicht
        progressTimer = setInterval(function(){
          if (progressFakePct < 90) {
            progressFakePct += Math.random() * 5;
            progressFill.style.width = progressFakePct + '%';
          }
        }, 400);
      } catch(e){ /* still */ }
    }
    function endProgress(success){
      try {
        if (progressTimer) clearInterval(progressTimer);
        progressFill.style.width = '100%';
        progressLbl.textContent = success === false ? 'Fehlgeschlagen ✕' : 'Fertig ✓';
        setTimeout(function(){ progressEl.style.display = 'none'; progressFill.style.width = '0%'; }, 900);
      } catch(e){ /* still */ }
    }

    // Echter Prozent-Fortschritt (fuer Datei-Uploads mit bekannter Groesse)
    function startProgressPct(label){
      try {
        if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
        progressLbl.textContent = (label || 'Hochladen …') + ' 0%';
        progressEl.style.display = 'block';
        progressFill.style.width = '0%';
        progressEl.dataset.label = label || 'Hochladen …';
      } catch(e){ /* still */ }
    }
    function setProgressPct(pct){
      try {
        if (pct < 0) pct = 0; if (pct > 100) pct = 100;
        progressFill.style.width = pct + '%';
        var base = progressEl.dataset.label || 'Hochladen …';
        progressLbl.textContent = base + ' ' + pct + '%';
      } catch(e){ /* still */ }
    }

    // CMS-Events abfangen.
    // Sveltia kennt nur die Events 'preSave' und 'postSave' (kein login/logout/
    // prePublish ohne Editorial Workflow). Einen ECHTEN Prozent-Fortschritt gibt
    // es nicht: Speichern/Upload laufen in Sveltias eigener Oberflaeche und der
    // Git-Commit ist atomar. Darum zeigen wir zwischen preSave und postSave nur
    // eine UNBESTIMMTE "Speichern laeuft"-Anzeige (wandernder Balken), damit man
    // sieht, dass etwas passiert. WICHTIG: Der preSave-Handler gibt NICHTS zurueck
    // -> der zu speichernde Datensatz bleibt garantiert unveraendert (nur ein
    // Rueckgabewert wuerde ihn aendern). 'postSave' beendet die Anzeige.
    function hookCMSEvents(){
      try {
        if (!window.CMS || typeof window.CMS.registerEventListener !== 'function') return false;
        try {
          window.CMS.registerEventListener({
            name: 'preSave',
            handler: function(){
              try {
                progressEl.style.display = 'block';
                progressFill.style.width = '';   // inline-Breite loesen -> Klasse uebernimmt
                progressFill.classList.add('ww-indeterminate');
                progressLbl.textContent = '⏳ Speichern läuft – bitte warten …';
              } catch(e){}
              // BEWUSST kein return -> Datensatz unveraendert
            }
          });
          window.CMS.registerEventListener({
            name: 'postSave',
            handler: function(){
              try {
                progressFill.classList.remove('ww-indeterminate');
                progressEl.style.display = 'block';
                progressFill.style.width = '100%';
                progressLbl.textContent = 'Gespeichert ✓';
                setTimeout(function(){
                  progressEl.style.display = 'none';
                  progressFill.style.width = '0%';
                }, 1200);
              } catch(e){}
            }
          });
        } catch(e){ /* Event nicht verfuegbar -> still ignorieren */ }
        return true;
      } catch(e){ console.warn('CMS-Hooks nicht möglich:', e); return false; }
    }

    // Login-Erkennung per DOM/URL: Ist das CMS eingeloggt, rendert es die
    // Verwaltungsoberflaeche und navigiert per Hash-Route (#/collections/...).
    // Ausgeloggt zeigt es nur einen Login-/Anmelden-Knopf.
    // WICHTIG: Wir verlassen uns NICHT auf interne CSS-Klassennamen (die sich
    // zwischen Decap und Sveltia und zwischen Versionen unterscheiden), sondern
    // auf stabile Signale: die Hash-Route und das Vorhandensein eines
    // Login-Knopfes. Diese vom CMS gepflegte Markierung liest die Website, um
    // die Bearbeiten-Stifte zu zeigen.
    (function(){
      function hasLoginButton(){
        var btns = document.querySelectorAll('button, a');
        for (var i = 0; i < btns.length; i++) {
          var t = (btns[i].textContent || '').trim().toLowerCase();
          // exakte/kurze Login-Beschriftung des Anmeldebildschirms
          if (t === 'login' || t === 'anmelden' || t === 'sign in' ||
              t.indexOf('mit github anmelden') !== -1 ||
              t.indexOf('sign in with github') !== -1 ||
              t.indexOf('login with github') !== -1) return true;
        }
        return false;
      }
      function isLoggedIn(){
        try {
          var hash = location.hash || '';
          // Eingeloggt: das CMS arbeitet mit Routen wie #/collections/... ,
          // #/workflow, #/media usw. Der Login-Screen hat keine solche Route.
          var onAppRoute = /#\/(collections|workflow|media|search|settings|entries)/i.test(hash);
          if (onAppRoute) return true;
          // Kein Login-Knopf sichtbar UND die App hat nennenswerten Inhalt
          // gerendert -> als eingeloggt werten.
          if (!hasLoginButton() && document.body && document.body.childElementCount > 1) {
            // zusaetzliche Absicherung: Anmeldescreen ist meist sehr „leer".
            if (document.body.innerText && document.body.innerText.length > 400) return true;
          }
          if (hasLoginButton()) return false;
          // Unklar -> letzten bekannten Zustand beibehalten
          return localStorage.getItem('ww-admin-active') === '1';
        } catch(e){ return false; }
      }
      var iv = setInterval(function(){
        try {
          if (isLoggedIn()) localStorage.setItem('ww-admin-active', '1');
          else localStorage.removeItem('ww-admin-active');
        } catch(e){}
      }, 1500);
    })();

    // HINWEIS: Hier stand frueher ein window.fetch-Override, der Uploads auf
    // XMLHttpRequest umleitete, um einen echten Prozent-Fortschritt zu zeigen.
    // Das ist mit Sveltia NICHT vertraeglich -- Sveltia committet ueber eigene
    // fetch-Aufrufe (auch grosse JSON-Bodies), und ein gekapertes window.fetch
    // kann das Speichern/Hochladen zerstoeren. Darum entfernt. Sveltia bringt
    // seine eigene Upload- und Speicheranzeige mit.


    // ----------- 2b) Upload-Schutz: Größe + Dateityp prüfen -----------
    // Cloudflare Pages lehnt Dateien über 25 MB ab -> dann scheitert der ganze
    // Deploy. Wir warnen daher SOFORT bei der Dateiauswahl, bevor etwas hochgeht.
    (function(){
      var MAX_MB = 24; // knapp unter Cloudflares 25-MB-Limit
      // Erlaubte Endungen pro Sinn-Kategorie
      var ALLOWED = {
        Bild: ['jpg','jpeg','png','webp','gif','svg','avif'],
        Video: ['mp4','webm','mov'],
        Dokument: ['pdf']
      };
      var allExt = [];
      for (var key in ALLOWED) allExt = allExt.concat(ALLOWED[key]);

      function fmtMB(bytes){ return (bytes / (1024*1024)).toFixed(1); }

      function checkFiles(input){
        if (!input.files || !input.files.length) return;
        for (var i = 0; i < input.files.length; i++) {
          var f = input.files[i];
          var ext = (f.name.split('.').pop() || '').toLowerCase();
          // Typ prüfen
          if (allExt.indexOf(ext) === -1) {
            alert(
              'Dieser Dateityp (.' + ext + ') wird nicht unterstützt.\n\n' +
              'Erlaubt sind:\n' +
              '• Bilder: ' + ALLOWED.Bild.join(', ') + '\n' +
              '• Videos: ' + ALLOWED.Video.join(', ') + '\n' +
              '• Dokumente: ' + ALLOWED.Dokument.join(', ')
            );
            input.value = '';
            return;
          }
          // Größe prüfen
          if (f.size > MAX_MB * 1024 * 1024) {
            var tipp = (ALLOWED.Video.indexOf(ext) !== -1)
              ? '\n\nTipp für Videos: vor dem Hochladen verkleinern (z.B. mit HandBrake), ' +
                'auf Full HD (1920px) und 10–15 Sekunden kürzen. Ziel: unter 10 MB.'
              : '\n\nTipp für Bilder: vor dem Hochladen auf ca. 2000px Breite verkleinern.';
            alert(
              'Diese Datei ist zu groß: ' + f.name + '\n' +
              'Größe: ' + fmtMB(f.size) + ' MB — erlaubt sind maximal ' + MAX_MB + ' MB.\n\n' +
              'WICHTIG: Größere Dateien blockieren die Veröffentlichung der ganzen ' +
              'Website (Cloudflare-Limit). Bitte verkleinern und erneut hochladen.' + tipp
            );
            input.value = '';
            return;
          }
        }
      }

      // Alle Datei-Auswahlen im CMS abfangen (auch dynamisch nachgeladene)
      document.addEventListener('change', function(e){
        var t = e.target;
        if (t && t.tagName === 'INPUT' && t.type === 'file') checkFiles(t);
      }, true);
    })();

    // ----------- 3) (Ortssuche entfernt) -----------
    // Frueher hing hier eine selbstgebaute Nominatim-Ortssuche, die per DOM in
    // Decaps Reise-Editor eingehaengt wurde. Sveltia hat dafuer ein EINGEBAUTES
    // Karten-Feld (widget: map in config.yml) -- mit Suche, Klick-auf-Karte und
    // derselben Nominatim-Quelle, aber stabil von Sveltia gepflegt. Der alte
    // DOM-Code ist damit ueberfluessig und wurde entfernt.

    // ----------- 4) Initialisierung -----------
    function init(){
      var attempts = 0;
      var iv = setInterval(function(){
        attempts++;
        if (hookCMSEvents()) {
          clearInterval(iv);
          registerPreviews();
          console.log('[Wide & Wild] Admin-Erweiterungen aktiv.');
        } else if (attempts > 50) {
          clearInterval(iv);
          registerPreviews();
        }
      }, 200);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>

  <!-- ===========================================================
       Unsaved-Changes-Warnung
       Warnt beim Schliessen/Neuladen des Tabs, wenn im Editor
       ungespeicherte Aenderungen vorliegen. Bewusst eigenstaendig und
       UNABHAENGIG von Sveltias internen Stores:
         - Dirty-Flag wird durch gebubbelte input/change-Events im
           Editor gesetzt (Capture-Phase, faengt auch dynamisch
           nachgeladene Felder),
         - bei jedem Routenwechsel (hashchange -- von Sveltia selbst
           dispatcht) UND nach erfolgreichem Speichern (postSave)
           wieder zurueckgesetzt,
         - beforeunload zeigt die Browser-Standardwarnung.
       Sveltia nutzt selbst KEIN beforeunload -> kein Konflikt. Lieber
       im Zweifel einmal zu viel warnen als Sveltias Interna bekaempfen.
       =========================================================== -->
  <script>
  (function(){
    'use strict';

    var dirty = false;

    // Sind wir im Eintrags-Editor? Stabiles, von Sveltia gepflegtes
    // Signal: die Hash-Route #/collections/<name>/entries/<slug> bzw. /new
    function inEditor(){
      try {
        return /#\/collections\/[^/]+\/(entries\/|new)/i.test(location.hash || '');
      } catch (e) { return false; }
    }

    // 1) Eingabe/Auswahl im Editor markiert den Entwurf als "geaendert".
    //    Capture-Phase + Gate auf inEditor() -> robust gegen alles ausser-
    //    halb des Editors. Im Zweifel lieber setzen.
    function onEdit(){ if (inEditor()) dirty = true; }
    document.addEventListener('input',  onEdit, true);
    document.addEventListener('change', onEdit, true);

    // 2) Jeder Routenwechsel setzt das Flag zurueck und (neu) lokalisiert den
    //    Speichern-Button fuer den Editor. Editor verlassen/wechseln = nicht
    //    mehr relevant.
    //
    //    GRENZE (bewusst, kein Bug): Das interne Zurueck-Navigieren im CMS
    //    (Editor -> Liste) ist ueber beforeunload PRINZIPIELL NICHT abfangbar,
    //    weil bei SPA-Navigation KEIN Page-Unload stattfindet. beforeunload
    //    feuert nur beim echten Schliessen/Neuladen des Tabs. Ein Warnen bei
    //    In-App-Navigation ginge nur ueber Sveltias internen Navigations-Guard,
    //    den wir bewusst nicht anfassen.
    window.addEventListener('hashchange', function(){ dirty = false; watchSaveButton(); });

    // 3) Erfolgreiches Speichern setzt das Flag zurueck. window.CMS kann
    //    beim Laden noch fehlen -> kurz pollen (wie die Erweiterungen oben).
    //    Klappt der Hook nicht, greift weiterhin das hashchange-Reset nach
    //    dem (per Default) automatischen Schliessen des Editors.
    (function hookPostSave(){
      var tries = 0;
      var iv = setInterval(function(){
        tries++;
        try {
          if (window.CMS && typeof window.CMS.registerEventListener === 'function') {
            clearInterval(iv);
            try {
              window.CMS.registerEventListener({
                name: 'postSave',
                handler: function(){ dirty = false; /* bewusst kein return */ }
              });
            } catch (e) { /* Event nicht verfuegbar -> still ignorieren */ }
          } else if (tries > 50) {
            clearInterval(iv);
          }
        } catch (e) { clearInterval(iv); }
      }, 200);
    })();

    // 3b) ZWEITES Dirty-Signal: der Speichern-Button.
    //     Manche Felder (select, Liste, Bild, Boolean) werfen KEIN bubbelndes
    //     input/change -> der schnelle Pfad (1) verpasst sie. Sveltia aktiviert
    //     aber bei JEDER echten Aenderung seinen Speichern-Button. Wir beobachten
    //     daher dessen aktiv/inaktiv-Zustand per MutationObserver.
    //     WICHTIG: Der Button wird NICHT ueber interne CSS-Klassen oder Sveltia-
    //     Stores gefunden, sondern -- wie der Login-Check oben -- ueber sein
    //     Text-Label ("Speichern"/"Save"). Das ist versionsstabil.
    //     Gilt NUR fuer bestehende Eintraege (/entries/): bei /new ist Speichern
    //     sofort aktiv, sonst wuerde schon das blosse Oeffnen warnen.
    //     Graceful degrade: wird kein Button gefunden, bleibt exakt das heutige
    //     Verhalten (kein Regressionsrisiko).
    var saveObserver = null;
    function inExistingEntry(){
      try { return /#\/collections\/[^/]+\/entries\//i.test(location.hash || ''); }
      catch (e) { return false; }
    }
    function btnEnabled(b){
      try { return !b.disabled && b.getAttribute('aria-disabled') !== 'true'; }
      catch (e) { return false; }
    }
    function findSaveButton(){
      try {
        var bs = document.querySelectorAll('button, [role="button"]');
        for (var i = 0; i < bs.length; i++) {
          var t = (bs[i].textContent || '').trim().toLowerCase();
          if (t === 'speichern' || t === 'save') return bs[i];
        }
      } catch (e) {}
      return null;
    }
    function watchSaveButton(){
      try {
        if (saveObserver) { saveObserver.disconnect(); saveObserver = null; }
        if (!inExistingEntry()) return;
        // Der Editor rendert asynchron nach dem Routenwechsel -> kurz pollen.
        var tries = 0;
        var iv = setInterval(function(){
          tries++;
          var btn = findSaveButton();
          if (btn) {
            clearInterval(iv);
            // Direkt aktiv (z.B. wiederhergestellter Entwurf) -> bereits dirty.
            if (btnEnabled(btn) && inExistingEntry()) dirty = true;
            saveObserver = new MutationObserver(function(){
              if (btnEnabled(btn) && inExistingEntry()) dirty = true;
            });
            saveObserver.observe(btn, {
              attributes: true,
              attributeFilter: ['disabled', 'aria-disabled', 'class']
            });
          } else if (tries > 25) {
            clearInterval(iv); // nicht gefunden -> heutiges Verhalten
          }
        }, 200);
      } catch (e) {}
    }
    // Falls die Seite direkt in einem Editor geladen wird:
    watchSaveButton();

    // 4) Browserwarnung beim Schliessen/Neuladen, solange ungespeichert.
    window.addEventListener('beforeunload', function(e){
      if (!dirty) return;
      e.preventDefault();
      e.returnValue = '';   // fuer Chrome/Firefox noetig; zeigt Standardtext
    });
  })();
  </script>
</body>
</html>
