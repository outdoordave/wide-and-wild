<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Wide &amp; Wild — Verwaltung</title>
  <!-- Decap CMS uebernimmt das GitHub-OAuth-Popup selbst.
       Login geht ueber den Cloudflare-Worker (siehe admin/config.yml -> backend.base_url). -->
  <style>
    /* Zurück-zur-Website-Knopf oben rechts */
    .ww-back-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 999999;
      background: #a7672f;
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      transition: background .15s;
    }
    .ww-back-btn:hover { background: #b97a3f; }

    /* Upload-/Speicher-Indikator (Banner unten) */
    #ww-progress {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999998;
      background: #1c1812;
      color: #f4ede1;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      min-width: 260px;
    }
    #ww-progress .ww-progress-label { margin-bottom: 6px; }
    #ww-progress .ww-progress-bar {
      height: 6px;
      background: rgba(255,255,255,.15);
      border-radius: 3px;
      overflow: hidden;
    }
    #ww-progress .ww-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #a7672f, #b08a4f);
      width: 0%;
      transition: width .3s;
      border-radius: 3px;
    }

    /* Ortssuche-Dropdown */
    .ww-place-results {
      position: absolute;
      z-index: 99999;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      max-height: 240px;
      overflow-y: auto;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px;
      min-width: 280px;
    }
    .ww-place-results .ww-place-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .ww-place-results .ww-place-item:last-child { border-bottom: none; }
    .ww-place-results .ww-place-item:hover { background: #f4ede1; }
    .ww-place-results .ww-place-empty { padding: 8px 12px; color: #888; }
  </style>
</head>
<body>
  <!-- Zurück zur Website -->
  <a href="/" class="ww-back-btn" title="Zurück zur Website">← Zurück zur Website</a>

  <!-- Fortschritts-Banner -->
  <div id="ww-progress" role="status" aria-live="polite">
    <div class="ww-progress-label">Speichern …</div>
    <div class="ww-progress-bar"><div class="ww-progress-fill"></div></div>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.1.3/dist/decap-cms.js"></script>

  <!-- Erweiterungen (Ortssuche, Fortschrittsanzeige, Login-Redirect) -->
  <script>
  (function(){
    'use strict';

    // ----------- 1) (Login-Handling uebernimmt Decap CMS via GitHub-OAuth-Worker) -----------

    // ----------- 1b) Beitrags-Vorschau wie auf der Website -----------
    // Registriert ein Preview-Template fuer Stories, das das reader-hero/
    // reader-body-Layout der echten Seite nachbildet (Farben, Schriften, Bilder).
    var WW_PREVIEW_CSS = [
      ':root{',
      '  --c-bg:#f4ede1; --c-bg-alt:#ebe1d1; --c-ink:#2e2418; --c-ink-soft:#6e5e49;',
      '  --c-line:#d8cab2; --c-accent:#a7672f; --c-accent-dk:#834e1f; --c-gold:#b08a4f;',
      '  --radius:10px;',
      '}',
      'body{margin:0;background:var(--c-bg);color:var(--c-ink);',
      '  font-family:Georgia,"Times New Roman",serif;}',
      '.ww-prev-hero{position:relative;min-height:42vh;display:flex;align-items:flex-end;',
      '  background-size:cover;background-position:center;background-color:var(--c-bg-alt);}',
      '.ww-prev-hero::before{content:"";position:absolute;inset:0;z-index:1;',
      '  background:linear-gradient(to top,var(--c-bg) 1%,rgba(244,237,225,0.1) 45%,transparent);}',
      '.ww-prev-hero-inner{position:relative;z-index:2;max-width:760px;margin:0 auto;',
      '  width:100%;padding:0 24px 36px;box-sizing:border-box;}',
      '.ww-prev-hero-inner .meta{font-size:12px;letter-spacing:2px;text-transform:uppercase;',
      '  color:var(--c-accent);font-weight:700;margin-bottom:12px;}',
      '.ww-prev-hero-inner h1{font-size:clamp(30px,5vw,52px);font-weight:500;line-height:1.08;margin:0;}',
      '.ww-prev-body{max-width:720px;margin:0 auto;padding:40px 24px 30px;box-sizing:border-box;}',
      '.ww-prev-body p{font-size:18px;line-height:1.85;margin-bottom:24px;color:#4a3d2c;}',
      '.ww-prev-body p:first-of-type::first-letter{font-size:60px;font-weight:600;float:left;',
      '  line-height:0.8;padding:6px 12px 0 0;color:var(--c-accent);}',
      '.ww-prev-body h2{font-size:30px;font-weight:600;line-height:1.2;margin:44px 0 16px;color:var(--c-ink);}',
      '.ww-prev-body h3{font-size:23px;font-weight:600;line-height:1.25;margin:36px 0 12px;color:var(--c-ink);}',
      '.ww-prev-body blockquote{font-size:27px;font-style:italic;line-height:1.35;color:var(--c-accent);',
      '  border-left:3px solid var(--c-gold);padding-left:24px;margin:40px 0;}',
      '.ww-prev-body ul,.ww-prev-body ol{font-size:18px;line-height:1.85;margin:0 0 24px 26px;color:#4a3d2c;}',
      '.ww-prev-body a{color:var(--c-accent);text-underline-offset:2px;}',
      '.ww-prev-body img{max-width:100%;max-height:540px;width:auto;height:auto;object-fit:cover;',
      '  border-radius:var(--radius);margin:38px auto;display:block;}',
      '.ww-prev-empty{max-width:720px;margin:0 auto;padding:24px;color:var(--c-ink-soft);font-style:italic;}',
      '.ww-prev-gear{max-width:720px;margin:0 auto;padding:30px 24px;}',
      '.ww-prev-gear-h{font-size:28px;font-weight:600;margin:0 0 24px;color:#2e2418;}',
      '.ww-prev-gear-cat{margin-bottom:24px;}',
      '.ww-prev-gear-cat-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#a7672f;font-weight:700;margin-bottom:8px;border-bottom:1px solid #d8cab2;padding-bottom:4px;}',
      '.ww-prev-gear-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ebe1d1;}',
      '.ww-prev-gear-item{font-size:16px;color:#2e2418;}',
      '.ww-prev-gear-brand{font-size:14px;color:#6e5e49;}'
    ].join('\n');

    // Bildpfad normalisieren (analog zur Website-Logik fuer /uploads/)
    function wwNormalizeImage(path){
      if (!path) return '';
      if (/^https?:\/\//i.test(path)) return path;
      if (path.charAt(0) === '/') return path;
      // relative Pfade unter uploads/ zu /uploads/ machen
      if (path.indexOf('uploads/') === 0) return '/' + path;
      return '/uploads/' + path.replace(/^\.?\//, '');
    }

    function registerPreviews(){
      // Decap stellt 'h' (React.createElement) und 'CMS' global bereit.
      // In einer strict-IIFE kann window.h verzoegert sein – beide Wege pruefen.
      var CMSref = window.CMS || (typeof CMS !== 'undefined' ? CMS : null);
      var href   = window.h   || (typeof h   !== 'undefined' ? h   : null);
      if (!CMSref || !href) return false;
      var h = href;

      try {
        CMSref.registerPreviewStyle(WW_PREVIEW_CSS, { raw: true });

        CMSref.registerPreviewTemplate('stories', function(props){
        var entry = props.entry;
        function get(field){ return entry.getIn(['data', field]) || ''; }

        // DE bevorzugen; wenn leer, EN
        var title = get('title_de') || get('title_en') || '(ohne Titel)';
        var cat   = get('category_de') || get('category_en') || '';
        var cover = wwNormalizeImage(get('cover'));

        // Markdown-Body als gerendertes HTML holen (Decap liefert widgetFor)
        var bodyDe = props.widgetFor('body_de');
        var bodyEn = props.widgetFor('body_en');
        var hasDe  = !!get('body_de');

        var heroStyle = cover ? { backgroundImage: 'url("' + cover + '")' } : {};

        return h('div', {},
          h('div', { className: 'ww-prev-hero', style: heroStyle },
            h('div', { className: 'ww-prev-hero-inner' },
              cat ? h('div', { className: 'meta' }, cat) : null,
              h('h1', {}, title)
            )
          ),
          h('div', { className: 'ww-prev-body' },
            hasDe ? bodyDe : (get('body_en') ? bodyEn :
              h('div', { className: 'ww-prev-empty' }, 'Noch kein Text. Schreibe etwas im Feld „Haupttext".'))
          )
        );
        });

        // ----- Equipment-Vorschau wie auf der Website (gruppiert nach Kategorie) -----
        var GEAR_CATS = [
          { cat:'cameras', de:'Kameras' }, { cat:'lenses', de:'Objektive' },
          { cat:'drones', de:'Drohne & Action' }, { cat:'phone', de:'Smartphone' },
          { cat:'tripod', de:'Stativ' }, { cat:'backpack', de:'Rucksack' },
          { cat:'cooking', de:'Kochen & Camp' }
        ];
        CMSref.registerPreviewTemplate('equipment', function(props){
          var items = props.entry.getIn(['data','items']);
          var list = items && items.toJS ? items.toJS() : [];
          var groups = [];
          for (var c = 0; c < GEAR_CATS.length; c++) {
            var inCat = list.filter(function(it){ return it && it.category === GEAR_CATS[c].cat; });
            if (inCat.length) groups.push({ name: GEAR_CATS[c].de, items: inCat });
          }
          return h('div', { className: 'ww-prev-gear' },
            h('h2', { className: 'ww-prev-gear-h' }, 'Womit wir fotografieren'),
            groups.length === 0
              ? h('div', { className: 'ww-prev-empty' }, 'Noch keine Ausrüstung eingetragen.')
              : groups.map(function(g, gi){
                  return h('div', { key: gi, className: 'ww-prev-gear-cat' },
                    h('div', { className: 'ww-prev-gear-cat-name' }, g.name),
                    g.items.map(function(it, ii){
                      return h('div', { key: ii, className: 'ww-prev-gear-row' },
                        h('span', { className: 'ww-prev-gear-item' }, it.name || ''),
                        h('span', { className: 'ww-prev-gear-brand' }, it.brand || '')
                      );
                    })
                  );
                })
          );
        });

        return true;
      } catch(e){
        console.warn('[Wide & Wild] Vorschau-Registrierung fehlgeschlagen:', e);
        return false;
      }
    }


    // ----------- 2) Upload-/Speicher-Fortschrittsanzeige -----------
    var progressEl   = document.getElementById('ww-progress');
    var progressLbl  = progressEl.querySelector('.ww-progress-label');
    var progressFill = progressEl.querySelector('.ww-progress-fill');
    var progressTimer = null;
    var progressFakePct = 0;

    function startProgress(label){
      try {
        if (progressTimer) clearInterval(progressTimer);
        progressLbl.textContent = label || 'Bitte warten …';
        progressEl.style.display = 'block';
        progressFakePct = 5;
        progressFill.style.width = progressFakePct + '%';
        // sanfter Fake-Fortschritt – echte Bytes kennt das CMS leider nicht
        progressTimer = setInterval(function(){
          if (progressFakePct < 90) {
            progressFakePct += Math.random() * 5;
            progressFill.style.width = progressFakePct + '%';
          }
        }, 400);
      } catch(e){ /* still */ }
    }
    function endProgress(success){
      try {
        if (progressTimer) clearInterval(progressTimer);
        progressFill.style.width = '100%';
        progressLbl.textContent = success === false ? 'Fehlgeschlagen ✕' : 'Fertig ✓';
        setTimeout(function(){ progressEl.style.display = 'none'; progressFill.style.width = '0%'; }, 900);
      } catch(e){ /* still */ }
    }

    // Echter Prozent-Fortschritt (fuer Datei-Uploads mit bekannter Groesse)
    function startProgressPct(label){
      try {
        if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
        progressLbl.textContent = (label || 'Hochladen …') + ' 0%';
        progressEl.style.display = 'block';
        progressFill.style.width = '0%';
        progressEl.dataset.label = label || 'Hochladen …';
      } catch(e){ /* still */ }
    }
    function setProgressPct(pct){
      try {
        if (pct < 0) pct = 0; if (pct > 100) pct = 100;
        progressFill.style.width = pct + '%';
        var base = progressEl.dataset.label || 'Hochladen …';
        progressLbl.textContent = base + ' ' + pct + '%';
      } catch(e){ /* still */ }
    }

    // CMS-Events abfangen
    function hookCMSEvents(){
      try {
        if (!window.CMS) return false;
        // Pre-Save → Anzeige starten
        window.CMS.registerEventListener({
          name: 'prePublish',
          handler: function(){ startProgress('Speichern & Veröffentlichen …'); }
        });
        window.CMS.registerEventListener({
          name: 'postPublish',
          handler: function(){ endProgress(true); }
        });
        window.CMS.registerEventListener({
          name: 'preSave',
          handler: function(){ startProgress('Speichern …'); }
        });
        window.CMS.registerEventListener({
          name: 'postSave',
          handler: function(){ endProgress(true); }
        });
        // Eigene Admin-Markierung setzen, damit die Hauptseite den Admin-Modus
        // zuverlaessig erkennt (unabhaengig vom internen Decap-Speicher-Key).
        window.CMS.registerEventListener({
          name: 'login',
          handler: function(){ try { localStorage.setItem('ww-admin-active', '1'); } catch(e){} }
        });
        window.CMS.registerEventListener({
          name: 'logout',
          handler: function(){
            try {
              localStorage.removeItem('ww-admin-active');
              // alle Decap-User-Keys aufraeumen, damit kein Resttoken bleibt
              var toDel = [];
              for (var i = 0; i < localStorage.length; i++) {
                var k = localStorage.key(i);
                if (k && /(decap|netlify)-cms-user/i.test(k)) toDel.push(k);
              }
              for (var j = 0; j < toDel.length; j++) localStorage.removeItem(toDel[j]);
              // Signal fuer die Hauptseite, den Admin-Modus zu verlassen
              localStorage.setItem('ww-just-logged-out', String(Date.now()));
            } catch(e){}
            // Nach kurzer Verzoegerung zur Hauptwebsite umleiten
            setTimeout(function(){ window.location.href = '/'; }, 600);
          }
        });
        return true;
      } catch(e){ console.warn('CMS-Hooks nicht möglich:', e); return false; }
    }

    // Login-Erkennung per DOM: Wenn das CMS eingeloggt ist, rendert es die
    // Verwaltungsoberflaeche (App-Header, Collections). Ist es ausgeloggt,
    // zeigt es nur den Login-Bildschirm mit "Login"-Button.
    // Das ist zuverlaessiger als die Token-Suche (Decap 3.x speichert den
    // Token nicht zwingend im localStorage).
    (function(){
      function isLoggedIn(){
        try {
          // Der Login-Screen hat einen Button mit "Login"-Text und KEINE
          // Collection-Navigation. Die eingeloggte App hat eine Sidebar/Nav.
          var loginBtns = document.querySelectorAll('button');
          var hasLoginScreen = false;
          for (var i = 0; i < loginBtns.length; i++) {
            var t = (loginBtns[i].textContent || '').toLowerCase();
            if (t.indexOf('login') !== -1 || t.indexOf('anmeld') !== -1) hasLoginScreen = true;
          }
          // Eingeloggte App: es gibt einen "Quick add"/"New"-Bereich oder die
          // Collection-Links im Seitenmenue.
          var hasApp = !!document.querySelector('[class*="SidebarHeading"], [class*="Card"], [class*="ListCard"], nav a[href*="/collections/"]');
          if (hasApp) return true;
          if (hasLoginScreen) return false;
          // Unklar -> letzten bekannten Zustand beibehalten
          return localStorage.getItem('ww-admin-active') === '1';
        } catch(e){ return false; }
      }
      var iv = setInterval(function(){
        try {
          if (isLoggedIn()) localStorage.setItem('ww-admin-active', '1');
          else localStorage.removeItem('ww-admin-active');
        } catch(e){}
      }, 1500);
    })();

    // Datei-Upload abfangen und mit ECHTEM Prozent-Fortschritt anzeigen.
    // fetch() kennt keinen Upload-Fortschritt, daher leiten wir Uploads auf
    // XMLHttpRequest um (das hat upload.onprogress mit echten Bytes).
    (function(){
      var origFetch = window.fetch;
      window.fetch = function(url, opts){
        try {
          var isUpload = opts && opts.method && /POST|PUT/i.test(opts.method)
                         && opts.body && (opts.body instanceof FormData
                                          || (typeof opts.body === 'string' && opts.body.length > 50000)
                                          || opts.body instanceof Blob
                                          || opts.body instanceof ArrayBuffer);
          if (!isUpload) return origFetch.apply(this, arguments);

          // Upload per XHR mit echtem Fortschritt
          return new Promise(function(resolve, reject){
            try {
              var xhr = new XMLHttpRequest();
              xhr.open(opts.method, (typeof url === 'string') ? url : url.url, true);
              // Header uebernehmen
              if (opts.headers) {
                var h = opts.headers;
                if (h.forEach) { h.forEach(function(v,k){ try{ xhr.setRequestHeader(k,v); }catch(e){} }); }
                else { for (var k in h) { try { xhr.setRequestHeader(k, h[k]); } catch(e){} } }
              }
              startProgressPct('Hochladen …');
              xhr.upload.onprogress = function(e){
                if (e.lengthComputable) {
                  var pct = Math.round((e.loaded / e.total) * 100);
                  setProgressPct(pct);
                }
              };
              xhr.onload = function(){
                setProgressPct(100);
                endProgress(xhr.status >= 200 && xhr.status < 300);
                // fetch-aehnliche Response zurueckgeben
                var body = xhr.responseText;
                resolve(new Response(body, {
                  status: xhr.status,
                  statusText: xhr.statusText,
                  headers: { 'Content-Type': xhr.getResponseHeader('Content-Type') || 'application/json' }
                }));
              };
              xhr.onerror = function(){ endProgress(false); reject(new TypeError('Network request failed')); };
              xhr.send(opts.body);
            } catch(e){
              endProgress(false);
              reject(e);
            }
          });
        } catch(e){ return origFetch.apply(this, arguments); }
      };
    })();

    // ----------- 3) Ortssuche via OpenStreetMap Nominatim -----------
    // Sucht in jedem `place_search`-Feld und schreibt Ergebnis in name/lat/lon
    var placeDebounce = null;

    function findStopFields(searchInput){
      // Strategie: Vom place_search-Input ausgehend nach den naechsten 3 Inputs
      // im DOM suchen. In der Stop-Liste folgen direkt: name (string), lat (number), lon (number).
      var container = searchInput.closest('[class*="ListItem"], [class*="list-item"], fieldset');
      if (!container) {
        // Fallback: 5 Ebenen hoch um sicher das List-Item zu erwischen
        container = searchInput.parentNode;
        for (var k = 0; k < 5 && container && container.parentNode; k++) container = container.parentNode;
      }
      if (!container) return { name: null, lat: null, lon: null };

      var allInputs = container.querySelectorAll('input, textarea');
      var result = { name: null, lat: null, lon: null };

      // PRIMAER: nimm die 3 sichtbaren Inputs/Textareas direkt NACH dem searchInput
      var seenSearch = false;
      var picked = [];
      for (var j = 0; j < allInputs.length; j++) {
        if (allInputs[j] === searchInput) { seenSearch = true; continue; }
        if (!seenSearch) continue;
        if (allInputs[j].type === 'hidden') continue;
        picked.push(allInputs[j]);
        if (picked.length === 3) break;
      }
      if (picked[0]) result.name = picked[0];
      if (picked[1]) result.lat  = picked[1];
      if (picked[2]) result.lon  = picked[2];

      // SEKUNDAER: Label-Match als Korrektur (falls Reihenfolge mal anders ist)
      var labels = container.querySelectorAll('label, [class*="FieldLabel"]');
      for (var i = 0; i < labels.length; i++){
        var t = (labels[i].textContent || '').toLowerCase();
        var input = labels[i].parentNode.querySelector('input, textarea');
        if (!input || input === searchInput) continue;
        if (t.indexOf('anzeigename') !== -1 || t.indexOf('ort (') !== -1) result.name = input;
        else if (t.indexOf('breitengrad') !== -1 || t.indexOf('(lat)') !== -1) result.lat = input;
        else if (t.indexOf('aengengrad') !== -1 || t.indexOf('ngengrad') !== -1 || t.indexOf('(lon)') !== -1) result.lon = input;
      }

      return result;
    }

    function setReactInputValue(input, value){
      // React-kontrollierte Inputs brauchen native Setter + input-Event
      try {
        var proto = Object.getPrototypeOf(input);
        var setter = Object.getOwnPropertyDescriptor(proto, 'value').set;
        setter.call(input, value);
        input.dispatchEvent(new Event('input', { bubbles: true }));
        input.dispatchEvent(new Event('change', { bubbles: true }));
      } catch(e){
        input.value = value;
        input.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }

    function attachPlaceSearch(searchInput){
      if (searchInput.dataset.wwPlaceAttached) return;
      searchInput.dataset.wwPlaceAttached = '1';

      var dropdown;
      function closeDropdown(){ if (dropdown && dropdown.parentNode) dropdown.parentNode.removeChild(dropdown); dropdown = null; }
      function openDropdown(items){
        closeDropdown();
        dropdown = document.createElement('div');
        dropdown.className = 'ww-place-results';
        var rect = searchInput.getBoundingClientRect();
        dropdown.style.top  = (window.scrollY + rect.bottom + 4) + 'px';
        dropdown.style.left = (window.scrollX + rect.left) + 'px';
        dropdown.style.width = rect.width + 'px';
        if (!items || !items.length) {
          var empty = document.createElement('div');
          empty.className = 'ww-place-empty';
          empty.textContent = 'Keine Treffer.';
          dropdown.appendChild(empty);
        } else {
          items.slice(0, 8).forEach(function(it){
            var d = document.createElement('div');
            d.className = 'ww-place-item';
            d.textContent = it.display_name;
            d.addEventListener('mousedown', function(ev){
              ev.preventDefault();
              // Felder befuellen
              var fields = findStopFields(searchInput);
              // Kurzer Name: erstes Komma-Segment
              var shortName = (it.display_name || '').split(',')[0].trim();
              if (fields.name) setReactInputValue(fields.name, shortName);
              if (fields.lat)  setReactInputValue(fields.lat,  String(it.lat));
              if (fields.lon)  setReactInputValue(fields.lon,  String(it.lon));
              // Suchfeld zeigt jetzt den Volltreffer (zur Bestaetigung)
              setReactInputValue(searchInput, it.display_name);
              closeDropdown();
            });
            dropdown.appendChild(d);
          });
        }
        document.body.appendChild(dropdown);
      }

      searchInput.addEventListener('input', function(){
        if (placeDebounce) clearTimeout(placeDebounce);
        var q = searchInput.value.trim();
        if (q.length < 3) { closeDropdown(); return; }
        placeDebounce = setTimeout(function(){
          var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=8&addressdetails=0&q=' + encodeURIComponent(q);
          fetch(url, { headers: { 'Accept': 'application/json' } })
            .then(function(r){ return r.ok ? r.json() : []; })
            .then(function(items){ openDropdown(items); })
            .catch(function(){ openDropdown([]); });
        }, 350);
      });
      searchInput.addEventListener('blur', function(){ setTimeout(closeDropdown, 200); });
    }

    // Beobachte das CMS-DOM: sobald ein Eingabefeld mit Label "Ort suchen" auftaucht, anhängen
    function scanForPlaceFields(){
      var labels = document.querySelectorAll('label, [class*="FieldLabel"]');
      for (var i = 0; i < labels.length; i++){
        var t = (labels[i].textContent || '').toLowerCase();
        if (t.indexOf('ort suchen') !== -1 || t.indexOf('🔍') !== -1) {
          var input = labels[i].parentNode.querySelector('input[type="text"], input:not([type])');
          if (input) attachPlaceSearch(input);
        }
      }
    }

    var domObserver = new MutationObserver(function(){ scanForPlaceFields(); });

    // ----------- 4) Initialisierung -----------
    function init(){
      var attempts = 0;
      var iv = setInterval(function(){
        attempts++;
        if (hookCMSEvents()) {
          clearInterval(iv);
          registerPreviews();
          domObserver.observe(document.body, { childList: true, subtree: true });
          scanForPlaceFields();
          console.log('[Wide & Wild] Admin-Erweiterungen aktiv.');
        } else if (attempts > 50) {
          clearInterval(iv);
          registerPreviews();
          // Trotzdem Ortssuche aktivieren, auch ohne CMS-Hooks
          domObserver.observe(document.body, { childList: true, subtree: true });
          scanForPlaceFields();
        }
      }, 200);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>
</body>
</html>
